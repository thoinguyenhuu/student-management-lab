<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap');

        :root {
            --bg: #f6f3ee;
            --ink: #1f2328;
            --muted: #5a6066;
            --brand: #0b6e4f;
            --brand-2: #f4a261;
            --card: #ffffff;
            --border: #e2ded7;
            --danger: #b21f2d;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 600px at 10% -10%, #fff6e8 0%, transparent 55%),
                        radial-gradient(800px 500px at 90% 10%, #e7f5ef 0%, transparent 50%),
                        var(--bg);
        }
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }
        .hero {
            display: grid;
            gap: 16px;
            align-items: end;
            grid-template-columns: 1fr;
            margin-bottom: 20px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 40px);
            margin: 0;
        }
        .subtitle {
            margin: 0;
            color: var(--muted);
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin: 18px 0 8px;
        }
        .search {
            display: flex;
            gap: 8px;
            align-items: center;
            flex: 1 1 380px;
        }
        .search input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-size: 14px;
        }
        .btn {
            appearance: none;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-ghost { background: #fff; color: var(--ink); border: 1px solid var(--border); }
        .btn-accent { background: var(--brand-2); color: #3a1f0f; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }
        tbody tr:hover {
            background: #faf7f2;
        }
        .actions a {
            margin-right: 10px;
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }
        .age-under-18 { color: var(--danger); font-weight: 700; }

        .meta {
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            .toolbar { align-items: stretch; }
            .search { flex: 1 1 100%; }
            .btn { justify-content: center; }
            th:nth-child(3), td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="hero">
        <div>
            <h1 class="title">Student Management</h1>
            <p class="subtitle">Browse, search, and manage student records.</p>
        </div>
    </div>

    <div class="toolbar">
        <form class="search" th:action="@{/students}" method="get">
            <input type="text" name="keyword" placeholder="Search by name" th:value="${keyword}">
            <button class="btn btn-ghost" type="submit">Search</button>
            <a class="btn btn-ghost" th:href="@{/students}">Clear</a>
        </form>
        <a class="btn btn-primary" th:href="@{/students/new}">Add New</a>
    </div>

    <div class="card">
        <div class="meta" th:if="${students != null}">Total: <span th:text="${students.size()}">0</span> students</div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}">ID</td>
                <td th:text="${student.name}">Name</td>
                <td th:text="${student.email}">Email</td>
                <td th:text="${student.age}" th:classappend="${student.age} < 18 ? 'age-under-18' : ''">0</td>
                <td class="actions">
                    <a th:href="@{/students/{id}(id=${student.id})}">Detail</a>
                    <a th:href="@{/students/edit/{id}(id=${student.id})}">Edit</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
