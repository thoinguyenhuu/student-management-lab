<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .toolbar form { display: flex; gap: 8px; align-items: center; }
        .button { background: #1f6feb; color: #fff; padding: 6px 12px; text-decoration: none; border-radius: 4px; }
        .actions a { margin-right: 8px; }
        .age-under-18 { color: #c00; font-weight: 600; }
    </style>
</head>
<body>
<h1>Student List (SSR)</h1>
<div class="toolbar">
    <form th:action="@{/students}" method="get">
        <input type="text" name="keyword" placeholder="Search by name" th:value="${keyword}">
        <button type="submit">Search</button>
        <a th:href="@{/students}">Clear</a>
    </form>
    <a class="button" th:href="@{/students/new}">Add New</a>
</div>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student : ${students}">
        <td th:text="${student.id}">ID</td>
        <td th:text="${student.name}">Name</td>
        <td th:text="${student.email}">Email</td>
        <td th:text="${student.age}" th:classappend="${student.age} < 18 ? 'age-under-18' : ''">0</td>
        <td class="actions">
            <a th:href="@{/students/{id}(id=${student.id})}">Detail</a>
            <a th:href="@{/students/edit/{id}(id=${student.id})}">Edit</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
