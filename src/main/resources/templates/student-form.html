<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Form</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap');

        :root {
            --bg: #f6f3ee;
            --ink: #1f2328;
            --muted: #5a6066;
            --brand: #0b6e4f;
            --card: #ffffff;
            --border: #e2ded7;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 600px at 10% -10%, #fff6e8 0%, transparent 55%),
                        radial-gradient(800px 500px at 90% 10%, #e7f5ef 0%, transparent 50%),
                        var(--bg);
        }
        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 4vw, 38px);
            margin: 0 0 10px;
        }
        .subtitle { color: var(--muted); margin: 0 0 18px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }
        label { font-weight: 600; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
        }
        .field { display: grid; gap: 6px; }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            appearance: none;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-ghost { background: #fff; color: var(--ink); border: 1px solid var(--border); }
    </style>
</head>
<body>
<div class="page">
    <h1 class="title" th:text="${formTitle}">Student Form</h1>
    <p class="subtitle" th:text="${isEdit} ? 'Update existing student information' : 'Create a new student record'">Form</p>

    <div class="card">
        <form th:action="@{${formAction}}" method="post" th:object="${student}">
            <div class="grid">
                <div class="field">
                    <label for="id">ID</label>
                    <input id="id" type="text" th:field="*{id}" required th:readonly="${isEdit}">
                </div>
                <div class="field">
                    <label for="name">Name</label>
                    <input id="name" type="text" th:field="*{name}" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" th:field="*{email}" required>
                </div>
                <div class="field">
                    <label for="age">Age</label>
                    <input id="age" type="number" min="0" th:field="*{age}" required>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit" th:text="${isEdit} ? 'Update' : 'Create'">Save</button>
                <a class="btn btn-ghost" th:href="@{/students}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
