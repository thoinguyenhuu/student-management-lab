<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { max-width: 520px; }
        .field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        label { font-weight: 600; }
        input { padding: 6px 8px; }
        .actions { margin-top: 12px; display: flex; gap: 10px; align-items: center; }
        .button { background: #1f6feb; color: #fff; padding: 6px 12px; text-decoration: none; border-radius: 4px; border: none; }
    </style>
</head>
<body>
<h1 th:text="${formTitle}">Student Form</h1>
<form th:action="@{${formAction}}" method="post" th:object="${student}">
    <div class="field">
        <label for="id">ID</label>
        <input id="id" type="text" th:field="*{id}" required th:readonly="${isEdit}">
    </div>
    <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" th:field="*{name}" required>
    </div>
    <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" th:field="*{email}" required>
    </div>
    <div class="field">
        <label for="age">Age</label>
        <input id="age" type="number" min="0" th:field="*{age}" required>
    </div>
    <div class="actions">
        <button class="button" type="submit" th:text="${isEdit} ? 'Update' : 'Create'">Save</button>
        <a th:href="@{/students}">Cancel</a>
    </div>
</form>
</body>
</html>
