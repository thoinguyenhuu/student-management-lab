<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Detail</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 16px; border-radius: 6px; max-width: 520px; }
        .row { margin-bottom: 8px; }
        .label { font-weight: 600; }
        .actions { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
        .button { background: #1f6feb; color: #fff; padding: 6px 12px; text-decoration: none; border-radius: 4px; }
        .danger { background: #d1242f; color: #fff; padding: 6px 12px; border: none; border-radius: 4px; }
        .age-under-18 { color: #c00; font-weight: 600; }
    </style>
</head>
<body>
<h1>Student Detail</h1>
<div class="card">
    <div class="row"><span class="label">ID:</span> <span th:text="${student.id}">ID</span></div>
    <div class="row"><span class="label">Name:</span> <span th:text="${student.name}">Name</span></div>
    <div class="row"><span class="label">Email:</span> <span th:text="${student.email}">Email</span></div>
    <div class="row"><span class="label">Age:</span> <span th:text="${student.age}" th:classappend="${student.age} < 18 ? 'age-under-18' : ''">0</span></div>
</div>
<div class="actions">
    <a class="button" th:href="@{/students/edit/{id}(id=${student.id})}">Edit</a>
    <form th:action="@{/students/delete/{id}(id=${student.id})}" method="post" onsubmit="return confirm('Delete this student?');">
        <button class="danger" type="submit">Delete</button>
    </form>
    <a th:href="@{/students}">Back</a>
</div>
</body>
</html>
